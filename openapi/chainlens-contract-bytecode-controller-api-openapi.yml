openapi: 3.0.1
info:
  title: Chainlens Account-Controller Contract-Bytecode-Controller API
  description: Chainlens provides a robust and intuitive platform combining user-friendly exploration with powerful analytics and advanced features. Whether monitoring real-time blockchain transactions, verifying smart contracts, or tracking NFTs, Chainlens ensures you have all the necessary tools at your fingertips.
  version: master
tags:
- name: Contract-Bytecode-Controller
paths:
  /contracts/{addressHash}/bytecode:
    get:
      tags:
      - Contract-Bytecode-Controller
      summary: Chainlens Retrieves bytecodes for a deployed contract.
      operationId: getContractBytecode
      parameters:
      - name: addressHash
        in: path
        description: The address hash identifying the contract.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/BytecodeModel'
components:
  schemas:
    BytecodeModel:
      required:
      - creationData
      - deployedCode
      type: object
      properties:
        deployedCode:
          type: string
        creationData:
          type: string
externalDocs:
  description: Chainlens Documentation
  url: https://docs.chainlens.com/
