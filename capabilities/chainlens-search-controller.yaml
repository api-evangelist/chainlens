      name: search
      description: REST surface for search.
      operations:
      - method: GET
        name: search1
        description: Chainlens Retrieve blocks, transactions, accounts by hash.
        call: chainlens-search-controller.search1
        with:
          query: rest.query
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search
      name: search
      description: REST surface for search.
