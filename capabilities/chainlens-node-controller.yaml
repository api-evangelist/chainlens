naftiko: 1.0.0-alpha2
info:
  label: Chainlens — Node-Controller
  description: 'Chainlens — Node-Controller. 1 operations. Lead operation: Chainlens Node details.. Self-contained Naftiko
    capability covering one Chainlens business surface.'
  tags:
  - Chainlens
  - Node-Controller
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHAINLENS_API_KEY: CHAINLENS_API_KEY
capability:
  consumes:
  - type: http
    namespace: chainlens-node-controller
    baseUri: ''
    description: Chainlens — Node-Controller business capability. Self-contained, no shared references.
    resources:
    - name: node-details
      path: /node/details
      operations:
      - name: details
        method: GET
        description: Chainlens Node details.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: chainlens-node-controller-rest
    port: 8080
    description: REST adapter for Chainlens — Node-Controller. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/node/details
      name: node-details
      description: REST surface for node-details.
      operations:
      - method: GET
        name: details
        description: Chainlens Node details.
        call: chainlens-node-controller.details
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: chainlens-node-controller-mcp
    port: 9090
    transport: http
    description: MCP adapter for Chainlens — Node-Controller. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: chainlens-node-details
      description: Chainlens Node details.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: chainlens-node-controller.details
      outputParameters:
      - type: object
        mapping: $.
