naftiko: 1.0.0-alpha2
info:
  label: Chainlens — Token-Holders-Controller
  description: 'Chainlens — Token-Holders-Controller. 1 operations. Lead operation: Chainlens Retrieve a list of token holders
    by token contract address hash.. Self-contained Naftiko capability covering one Chainlens business surface.'
  tags:
  - Chainlens
  - Token-Holders-Controller
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHAINLENS_API_KEY: CHAINLENS_API_KEY
capability:
  consumes:
  - type: http
    namespace: chainlens-token-holders-controller
    baseUri: ''
    description: Chainlens — Token-Holders-Controller business capability. Self-contained, no shared references.
    resources:
    - name: tokens-addressHash-holders
      path: /tokens/{addressHash}/holders
      operations:
      - name: gettokenholders
        method: GET
        description: Chainlens Retrieve a list of token holders by token contract address hash.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: addressHash
          in: path
          type: string
          description: The address hash identifying the contract.
          required: true
        - name: query
          in: query
          type: string
          required: true
  exposes:
  - type: rest
    namespace: chainlens-token-holders-controller-rest
    port: 8080
    description: REST adapter for Chainlens — Token-Holders-Controller. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tokens/{addresshash}/holders
      name: tokens-addresshash-holders
      description: REST surface for tokens-addressHash-holders.
      operations:
      - method: GET
        name: gettokenholders
        description: Chainlens Retrieve a list of token holders by token contract address hash.
        call: chainlens-token-holders-controller.gettokenholders
        with:
          addressHash: rest.addressHash
          query: rest.query
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: chainlens-token-holders-controller-mcp
    port: 9090
    transport: http
    description: MCP adapter for Chainlens — Token-Holders-Controller. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: chainlens-retrieve-list-token-holders
      description: Chainlens Retrieve a list of token holders by token contract address hash.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: chainlens-token-holders-controller.gettokenholders
      with:
        addressHash: tools.addressHash
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
