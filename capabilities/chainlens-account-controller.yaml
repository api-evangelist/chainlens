naftiko: 1.0.0-alpha2
info:
  label: Chainlens — Account-Controller
  description: 'Chainlens — Account-Controller. 2 operations. Lead operation: Chainlens Retrieve all accounts.. Self-contained
    Naftiko capability covering one Chainlens business surface.'
  tags:
  - Chainlens
  - Account-Controller
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHAINLENS_API_KEY: CHAINLENS_API_KEY
capability:
  consumes:
  - type: http
    namespace: chainlens-account-controller
    baseUri: ''
    description: Chainlens — Account-Controller business capability. Self-contained, no shared references.
    resources:
    - name: accounts
      path: /accounts
      operations:
      - name: getaccounts
        method: GET
        description: Chainlens Retrieve all accounts.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          required: true
    - name: accounts-addressHash
      path: /accounts/{addressHash}
      operations:
      - name: getaccount1
        method: GET
        description: Chainlens Retrieve an account by its address hash.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: addressHash
          in: path
          type: string
          description: The address hash identifying the account.
          required: true
  exposes:
  - type: rest
    namespace: chainlens-account-controller-rest
    port: 8080
    description: REST adapter for Chainlens — Account-Controller. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts
      name: accounts
      description: REST surface for accounts.
      operations:
      - method: GET
        name: getaccounts
        description: Chainlens Retrieve all accounts.
        call: chainlens-account-controller.getaccounts
        with:
          query: rest.query
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{addresshash}
      name: accounts-addresshash
      description: REST surface for accounts-addressHash.
      operations:
      - method: GET
        name: getaccount1
        description: Chainlens Retrieve an account by its address hash.
        call: chainlens-account-controller.getaccount1
        with:
          addressHash: rest.addressHash
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: chainlens-account-controller-mcp
    port: 9090
    transport: http
    description: MCP adapter for Chainlens — Account-Controller. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: chainlens-retrieve-all-accounts
      description: Chainlens Retrieve all accounts.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: chainlens-account-controller.getaccounts
      with:
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
    - name: chainlens-retrieve-account-its-address
      description: Chainlens Retrieve an account by its address hash.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: chainlens-account-controller.getaccount1
      with:
        addressHash: tools.addressHash
      outputParameters:
      - type: object
        mapping: $.
