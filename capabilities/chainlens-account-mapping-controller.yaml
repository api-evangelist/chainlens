naftiko: 1.0.0-alpha2
info:
  label: Chainlens — Account-Mapping-Controller
  description: 'Chainlens — Account-Mapping-Controller. 2 operations. Lead operation: Chainlens Retrieve Accounts. Self-contained
    Naftiko capability covering one Chainlens business surface.'
  tags:
  - Chainlens
  - Account-Mapping-Controller
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHAINLENS_API_KEY: CHAINLENS_API_KEY
capability:
  consumes:
  - type: http
    namespace: chainlens-account-mapping-controller
    baseUri: ''
    description: Chainlens — Account-Mapping-Controller business capability. Self-contained, no shared references.
    resources:
    - name: mappings
      path: /mappings
      operations:
      - name: findaccounts
        method: GET
        description: Chainlens Retrieve Accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          required: true
    - name: mappings-id
      path: /mappings/{id}
      operations:
      - name: getaccount
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: chainlens-account-mapping-controller-rest
    port: 8080
    description: REST adapter for Chainlens — Account-Mapping-Controller. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/mappings
      name: mappings
      description: REST surface for mappings.
      operations:
      - method: GET
        name: findaccounts
        description: Chainlens Retrieve Accounts
        call: chainlens-account-mapping-controller.findaccounts
        with:
          query: rest.query
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/mappings/{id}
      name: mappings-id
      description: REST surface for mappings-id.
      operations:
      - method: GET
        name: getaccount
        description: getaccount
        call: chainlens-account-mapping-controller.getaccount
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: chainlens-account-mapping-controller-mcp
    port: 9090
    transport: http
    description: MCP adapter for Chainlens — Account-Mapping-Controller. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: chainlens-retrieve-accounts
      description: Chainlens Retrieve Accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: chainlens-account-mapping-controller.findaccounts
      with:
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
    - name: getaccount
      description: getaccount
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: chainlens-account-mapping-controller.getaccount
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
