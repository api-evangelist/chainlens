naftiko: 1.0.0-alpha2
info:
  label: Chainlens — Erc-223-Transfers-Controller
  description: 'Chainlens — Erc-223-Transfers-Controller. 1 operations. Lead operation: Chainlens Retrieve transfers of an
    ERC223 Token.. Self-contained Naftiko capability covering one Chainlens business surface.'
  tags:
  - Chainlens
  - Erc-223-Transfers-Controller
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHAINLENS_API_KEY: CHAINLENS_API_KEY
capability:
  consumes:
  - type: http
    namespace: chainlens-erc-223-transfers-controller
    baseUri: ''
    description: Chainlens — Erc-223-Transfers-Controller business capability. Self-contained, no shared references.
    resources:
    - name: tokens-addressHash-erc223-transfers
      path: /tokens/{addressHash}/erc223/transfers
      operations:
      - name: finderc20transfers
        method: GET
        description: Chainlens Retrieve transfers of an ERC223 Token.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: addressHash
          in: path
          type: string
          description: The address hash identifying the token.
          required: true
        - name: query
          in: query
          type: string
          required: true
  exposes:
  - type: rest
    namespace: chainlens-erc-223-transfers-controller-rest
    port: 8080
    description: REST adapter for Chainlens — Erc-223-Transfers-Controller. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tokens/{addresshash}/erc223/transfers
      name: tokens-addresshash-erc223-transfers
      description: REST surface for tokens-addressHash-erc223-transfers.
      operations:
      - method: GET
        name: finderc20transfers
        description: Chainlens Retrieve transfers of an ERC223 Token.
        call: chainlens-erc-223-transfers-controller.finderc20transfers
        with:
          addressHash: rest.addressHash
          query: rest.query
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: chainlens-erc-223-transfers-controller-mcp
    port: 9090
    transport: http
    description: MCP adapter for Chainlens — Erc-223-Transfers-Controller. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: chainlens-retrieve-transfers-erc223-token
      description: Chainlens Retrieve transfers of an ERC223 Token.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: chainlens-erc-223-transfers-controller.finderc20transfers
      with:
        addressHash: tools.addressHash
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
