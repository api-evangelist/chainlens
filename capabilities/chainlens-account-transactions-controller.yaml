naftiko: 1.0.0-alpha2
info:
  label: Chainlens — Account-Transactions-Controller
  description: 'Chainlens — Account-Transactions-Controller. 1 operations. Lead operation: Chainlens Retrieve a transactions
    for an account.. Self-contained Naftiko capability covering one Chainlens business surface.'
  tags:
  - Chainlens
  - Account-Transactions-Controller
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHAINLENS_API_KEY: CHAINLENS_API_KEY
capability:
  consumes:
  - type: http
    namespace: chainlens-account-transactions-controller
    baseUri: ''
    description: Chainlens — Account-Transactions-Controller business capability. Self-contained, no shared references.
    resources:
    - name: accounts-addressHash-transactions
      path: /accounts/{addressHash}/transactions
      operations:
      - name: findaccounttransactions
        method: GET
        description: Chainlens Retrieve a transactions for an account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: addressHash
          in: path
          type: string
          description: The account address.
          required: true
        - name: query
          in: query
          type: string
          required: true
  exposes:
  - type: rest
    namespace: chainlens-account-transactions-controller-rest
    port: 8080
    description: REST adapter for Chainlens — Account-Transactions-Controller. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/accounts/{addresshash}/transactions
      name: accounts-addresshash-transactions
      description: REST surface for accounts-addressHash-transactions.
      operations:
      - method: GET
        name: findaccounttransactions
        description: Chainlens Retrieve a transactions for an account.
        call: chainlens-account-transactions-controller.findaccounttransactions
        with:
          addressHash: rest.addressHash
          query: rest.query
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: chainlens-account-transactions-controller-mcp
    port: 9090
    transport: http
    description: MCP adapter for Chainlens — Account-Transactions-Controller. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: chainlens-retrieve-transactions-account
      description: Chainlens Retrieve a transactions for an account.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: chainlens-account-transactions-controller.findaccounttransactions
      with:
        addressHash: tools.addressHash
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
