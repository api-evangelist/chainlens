      description: Chainlens Retrieve total number of different token types
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: chainlens-dashboard-tokens-totals-controller.gettokentotals
      outputParameters:
      - type: object
        mapping: $.
