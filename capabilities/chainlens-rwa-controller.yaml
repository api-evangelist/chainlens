      path: /rwas/{addressHash}/{tokenId}/metadata
      operations:
      - name: gettokenmetadata
        method: GET
        description: Chainlens Retrieve token metadata for a given token contract address and token id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
