      outputParameters:
      - type: object
        mapping: $.
    - name: chainlens-retrieve-token-metadata-given
      description: Chainlens Retrieve token metadata for a given token contract address and token id.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
