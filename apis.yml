description: Chainlens, built by Web3 Labs, is a blockchain explorer and analytics platform for EVM-compatible
  public and private chains (Ethereum, Hyperledger Besu, Quorum, Polygon, Avalanche, BNB Chain, etc.)
  as well as Substrate-based chains. It combines a user-friendly block explorer with powerful REST APIs
  for real-time transaction monitoring, smart contract verification, token and NFT tracking (ERC-20, ERC-721,
  ERC-1155), and integration of on-chain data with existing analytics and reporting pipelines. The API
  follows the EIP-3091 block explorer route conventions and is offered both as SaaS and self-hosted.
