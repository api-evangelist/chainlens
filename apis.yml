  description: The Chainlens REST API exposes block explorer data for EVM chains including transactions, internal transactions,
    events, blocks, addresses, tokens, NFTs, and smart contract metadata. Endpoints follow OpenAPI 3 conventions and the EIP-3091
    block explorer route standard, supporting real-time on-chain analytics, wallet inspection, contract verification look-up,
    and reporting pipelines.
